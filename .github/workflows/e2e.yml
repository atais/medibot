name: E2E tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          npm install
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r dev-requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      # The test server uses a fake service account committed in tests/.
      # No real secrets are needed for this smoke test.
      - name: Run E2E tests
        run: make test





